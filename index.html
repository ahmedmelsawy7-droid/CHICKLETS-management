<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#3b0764"/>
<title>Chicklets Manager</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
/* ═══════════════════════════════════════
   CHICKLETS MANAGER — STYLES
   ═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type="number"]{-moz-appearance:textfield;}

:root{
  --P:#3b0764;--P2:#6d28d9;--P3:#1e0036;
  --G:#10b981;--R:#ef4444;--O:#e8632a;--B:#3b82f6;--Y:#f59e0b;
  --bg:#f5f0ff;--card:#fff;--text:#1e293b;--sub:#64748b;--bdr:#e2e8f0;
}

body{font-family:-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:ltr;max-width:100vw;overflow-x:hidden;}

/* ── BRANCH SCREEN ── */
#BS{position:fixed;inset:0;background:linear-gradient(160deg,var(--P),var(--P2) 60%,var(--P3));display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:100;padding:36px 16px 24px;overflow-y:auto;overflow-x:hidden;width:100%;}
.bs-logo{width:110px;height:110px;border-radius:24px;object-fit:contain;background:#fff;padding:5px;box-shadow:0 12px 40px rgba(0,0,0,0.45);margin-bottom:12px;}
.bs-brand{color:#fff;font-size:30px;font-weight:900;}
.bs-tag{color:#c4b5fd;font-size:13px;margin-bottom:28px;}
.bs-wrap{width:100%;max-width:420px;}
.bs-lbl{color:#c4b5fd;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bcard{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.18);border-radius:16px;padding:18px 12px 14px;cursor:pointer;text-align:center;transition:all .18s;}
.bcard:active{transform:scale(0.96);background:rgba(255,255,255,0.2);}
.bcard-icon{font-size:28px;margin-bottom:8px;}
.bcard-name{color:#fff;font-weight:700;font-size:13px;}
.bcard-tap{color:#c4b5fd;font-size:10px;margin-top:3px;}
.bs-footer{display:flex;gap:10px;width:100%;max-width:420px;margin-top:14px;}
.btn-mgr{flex:1;background:rgba(16,185,129,0.15);border:1.5px solid var(--G);border-radius:14px;padding:13px;cursor:pointer;color:#fff;font-family:inherit;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-it{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);color:#c4b5fd;border-radius:14px;padding:13px 16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}

/* ── PIN ── */
.pin-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;}
.pin-box{background:#fff;border-radius:24px;padding:28px 22px;width:100%;max-width:340px;text-align:center;}
.pin-logo{width:56px;height:56px;border-radius:13px;margin:0 auto 10px;display:block;object-fit:contain;}
.pin-title{font-weight:900;font-size:17px;color:var(--P);margin-bottom:3px;}
.pin-sub{color:var(--sub);font-size:12px;margin-bottom:18px;}
.pin-err{color:var(--R);font-size:12px;font-weight:700;margin-bottom:10px;display:none;}
.pin-inp{width:100%;padding:13px;border:2px solid var(--bdr);border-radius:13px;font-size:20px;text-align:center;letter-spacing:6px;font-family:inherit;outline:none;color:var(--text);margin-bottom:13px;}
.pin-inp:focus{border-color:var(--P);}
.pin-btns{display:flex;gap:9px;}
.pin-btn{flex:1;padding:12px;border:none;border-radius:12px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;}
.pin-cancel{background:#f1f5f9;color:var(--sub);}
.pin-ok{background:linear-gradient(135deg,var(--P),var(--P2));color:#fff;}

/* ── SHARED ── */
.screen{display:none;min-height:100vh;}
.header{background:linear-gradient(135deg,var(--P),var(--P2));padding:11px 15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(59,7,100,0.4);}
.hlogo{width:34px;height:34px;border-radius:9px;object-fit:contain;background:#fff;padding:2px;}
.htitle{color:#fff;font-weight:900;font-size:15px;}
.hsub{color:#c4b5fd;font-size:10px;}
.hbtns{display:flex;gap:6px;}
.hbtn{border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 9px;border-radius:9px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;background:rgba(255,255,255,0.1);}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--bdr);overflow-x:auto;position:sticky;top:60px;z-index:49;}
.nav::-webkit-scrollbar{display:none;}
.nvb{flex:1;min-width:70px;padding:10px 3px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--sub);border-bottom:3px solid transparent;white-space:nowrap;}
.nvb.active{color:var(--P);border-bottom-color:var(--P);}
.content{padding:13px;max-width:100%;margin:0 auto;padding-bottom:30px;overflow-x:hidden;}

/* ── CARDS & COMPONENTS ── */
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card-title{font-weight:800;font-size:13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.hero{background:linear-gradient(135deg,var(--P),var(--P2));border-radius:18px;padding:16px;margin-bottom:13px;box-shadow:0 6px 24px rgba(59,7,100,0.35);}
.hero-g{background:linear-gradient(135deg,#064e3b,#065f46);border-radius:18px;padding:16px;margin-bottom:13px;box-shadow:0 5px 20px rgba(6,78,59,0.4);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.stat{background:rgba(255,255,255,0.13);border-radius:11px;padding:10px;text-align:center;}
.stat-v{color:#fff;font-weight:900;font-size:15px;}
.stat-l{color:rgba(255,255,255,0.7);font-size:10px;margin-top:2px;}
.net-bar{background:rgba(255,255,255,0.16);border-radius:12px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;}
.net-lbl{color:rgba(255,255,255,0.7);font-size:11px;}
.net-val{color:#fff;font-weight:900;font-size:19px;}

/* ── FORM ELEMENTS ── */
.dsec{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.dsh{padding:12px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
.dsico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.dst{font-weight:800;font-size:13px;}
.dtot{margin-left:auto;font-weight:900;font-size:13px;}
.darr{color:var(--sub);font-size:12px;transition:transform .2s;}
.darr.open{transform:rotate(180deg);}
.dsb{padding:0 14px 14px;}
.srow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bdr);}
.srow:last-child{border-bottom:none;}
.slbl{flex:1;font-weight:600;font-size:14px;}
.sinp{width:110px;padding:9px 10px;border:2px solid var(--bdr);border-radius:9px;font-size:15px;font-family:inherit;text-align:center;color:var(--text);outline:none;}
.sinp:focus{border-color:var(--P);}
.strow{display:flex;justify-content:space-between;padding:9px 0 0;border-top:2px solid var(--bdr);margin-top:3px;}
.bar{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:11px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.bar input,.bar select{flex:1;padding:8px 10px;border:2px solid var(--bdr);border-radius:9px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:#fff;}
.svbtn{padding:10px 16px;border:none;border-radius:10px;color:#fff;font-family:inherit;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;}
.svbtn-p{background:linear-gradient(135deg,var(--P),var(--P2));}
.svbtn-g{background:linear-gradient(135deg,#065f46,var(--G));}
.sts-paid{border:2px solid var(--G);background:#ecfdf5;color:var(--G);padding:5px 10px;border-radius:8px;font-family:inherit;font-weight:700;font-size:11px;cursor:pointer;}
.sts-pend{border:2px solid var(--Y);background:#fffbeb;color:#d97706;padding:5px 10px;border-radius:8px;font-family:inherit;font-weight:700;font-size:11px;cursor:pointer;}
.fnote{border-radius:9px;padding:9px 12px;margin-bottom:12px;font-size:12px;}
.remind{background:#fef3c7;border:2px solid #f59e0b;border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}

/* ── LOG ── */
.logi{background:var(--card);border-radius:13px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;}
.logh{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.logb{padding:11px 14px;border-top:1px solid var(--bdr);}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:14px;font-size:11px;font-weight:700;margin:2px;}

/* ── REPORTS ── */
.rcard{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.rsec{margin-bottom:10px;}
.rsec-t{font-weight:700;font-size:12px;margin-bottom:5px;}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#f8fafc;border-radius:7px;margin-bottom:3px;font-size:12px;}
.rnet{border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
.bc-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.bc-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.bc-body{padding:0 14px 14px;border-top:1px solid var(--bdr);}
.bc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding-top:10px;}
.bc-stat{border-radius:10px;padding:10px;text-align:center;}

/* ── IT ADMIN ── */
.it-hdr{background:linear-gradient(135deg,#1e3a5f,#1e40af);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.it-content{padding:14px;max-width:640px;margin:0 auto;padding-bottom:40px;}
.it-card{background:var(--card);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.it-card-title{font-weight:800;font-size:14px;margin-bottom:12px;color:#1e40af;display:flex;align-items:center;gap:7px;}
.branch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr);}
.branch-row:last-child{border-bottom:none;}
.rb{padding:6px 12px;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;}
.rb-e{background:#eff6ff;color:var(--B);}
.rb-d{background:#fef2f2;color:var(--R);}
.add-row{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.si{flex:1;min-width:72px;padding:8px 10px;border:2px solid var(--bdr);border-radius:9px;font-size:13px;font-family:inherit;outline:none;}
.si:focus{border-color:#1e40af;}
.sb{padding:8px 12px;border:none;border-radius:9px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;}
.sb-g{background:var(--G);color:#fff;}
.sb-b{background:#eff6ff;border:1px solid #bfdbfe;color:var(--B);}
.sb-r{background:#fef2f2;border:1px solid #fca5a5;color:var(--R);}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);}
.cat-item:last-child{border-bottom:none;}
.edit-inline{background:#f8fafc;border-radius:10px;padding:9px;margin:3px 0;display:flex;gap:7px;flex-wrap:wrap;width:100%;}
.icon-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.ic-btn{font-size:20px;background:#f8fafc;border:2px solid transparent;border-radius:8px;padding:5px 7px;cursor:pointer;}
.ic-btn.sel{border-color:var(--P2);background:#f5f3ff;}
.pass-row{display:flex;gap:8px;margin-bottom:8px;}
.pass-inp{flex:1;padding:10px 12px;border:2px solid var(--bdr);border-radius:10px;font-family:inherit;font-size:14px;outline:none;}
.pass-inp:focus{border-color:#1e40af;}
.pass-btn{padding:10px 16px;background:#1e40af;color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;}

/* ── AI CHAT ── */
.ai-hdr{background:linear-gradient(135deg,#1e1b4b,#3730a3);border-radius:18px;padding:16px;margin-bottom:13px;}
.ai-qbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.ai-qbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:7px 10px;border-radius:10px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.ai-msgs{max-height:400px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;}
.ai-input-row{display:flex;gap:8px;background:#fff;border-radius:14px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.ai-inp{flex:1;border:2px solid var(--bdr);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13px;outline:none;}
.ai-inp:focus{border-color:#6366f1;}
.ai-send{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:#fff;padding:10px 16px;font-family:inherit;font-weight:800;cursor:pointer;font-size:18px;}

/* ── COMPARE TABLE ── */
.compare-tbl{width:100%;border-collapse:collapse;min-width:500px;font-size:12px;}
.compare-tbl th{padding:8px 10px;text-align:center;font-weight:700;background:#f1f5f9;border-bottom:2px solid var(--bdr);}
.compare-tbl td{padding:7px 10px;text-align:center;border-bottom:1px solid var(--bdr);}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:4000;display:flex;align-items:flex-end;justify-content:center;}
.mbox{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;}
.mbtns{display:flex;gap:9px;margin-top:12px;}
.mbtn{flex:1;padding:12px;border:none;border-radius:11px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:26px;color:#fff;font-weight:700;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── EMPTY ── */
.empty{text-align:center;padding:32px 16px;color:var(--sub);}

/* ── PDF PRINT ── */
.pdf-btn{background:linear-gradient(135deg,#065f46,var(--G));color:#fff;border:none;border-radius:12px;padding:11px 20px;font-family:inherit;font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;margin-bottom:12px;}
@media print{
  #BS,#APP,#IT,#pin-ov,#moverlay,.pdf-btn,.nav,.header,.it-hdr{display:none!important;}
  #MGR{display:block!important;}
  .mgr-content{padding:0;}
  body{background:#fff;}
}

</style>
</head>

async function sbFetch(path, method = "GET", body = null) {
  const opts = {
    method,
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "resolution=merge-duplicates" : ""
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SB_URL + path, opts);
    if (!r.ok) return null;
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch (e) { return null; }
}

// ── BRANCHES ──
async function sbLoadBranches() {
  const d = await sbFetch("/rest/v1/branches?select=*&order=sort_order,id");
  if (d && d.length > 0) {
    branches = d.map(b => ({ id: b.id, name: b.name, nameEn: b.name_en || b.name, icon: b.icon || "🍗", pass: b.pass || "", sort_order: b.sort_order || 0 }));
    localStorage.setItem("branches", JSON.stringify(branches));
    renderBS();
  }
}
async function sbSaveBranch(b) {
  await sbFetch("/rest/v1/branches", "POST", { id: b.id, name: b.name, name_en: b.nameEn || b.name, icon: b.icon, pass: b.pass || "", sort_order: b.sort_order || 0 });
}
async function sbDeleteBranch(id) {
  await sbFetch("/rest/v1/branches?id=eq." + id, "DELETE");
}

// ── DAY LOGS ──

  const d = await sbFetch("/rest/v1/day_logs?branch_id=eq." + bid + "&select=*&order=date.desc");
  return d || [];
}
async function sbSaveDayLog(bid, log) {
  await sbFetch("/rest/v1/day_logs", "POST", { id: log.id, branch_id: bid, date: log.date, data: log.data });

async function sbDeleteDayLog(bid, id) {
  await sbFetch("/rest/v1/day_logs?id=eq." + id + "&branch_id=eq." + bid, "DELETE");
}

}

}

// ── SETTINGS ──
async function sbLoadSettings() {
  const d = await sbFetch("/rest/v1/settings?select=*");

    const m = {};
    d.forEach(r => m[r.key] = r.value);
    return m;
  }
  return null;
}

function fmtDate(d) {

// ── STORAGE ──
function bk(k) { return curBranch.id + "_" + k; }
function bg(k, d) {
  try { const v = localStorage.getItem(bk(k)); return v ? JSON.parse(v) : JSON.parse(JSON.stringify(d)); }
  catch (e) { return JSON.parse(JSON.stringify(d)); }
}
function bs(k, v) { localStorage.setItem(bk(k), JSON.stringify(v)); }
function loadBD() {
  dailyCats = bg("dc", DEF_DC);
  monthlyCats = bg("mc", DEF_MC);
  dayLogs = bg("dl", []);
  monthLogs = bg("ml", []);
  nextId = bg("ni", 1);
}
function saveBD() {
  bs("dc", dailyCats); bs("mc", monthlyCats);
  bs("dl", dayLogs); bs("ml", monthLogs);
  bs("ni", nextId);
  localStorage.setItem("itPass", itPass);
  localStorage.setItem("mgrPass", mgrPass);
  localStorage.setItem("clearPass", clearPass);
}
function getBD(bid) {
  const g = (k, d) => { try { const v = localStorage.getItem(bid + "_" + k); return v ? JSON.parse(v) : JSON.parse(JSON.stringify(d)); } catch (e) { return JSON.parse(JSON.stringify(d)); } };
  return { dc: g("dc", DEF_DC), mc: g("mc", DEF_MC), dl: g("dl", []), ml: g("ml", []) };
}

// ── SCREEN MANAGER ──
function showScreen(id) {
  ["BS", "IT", "APP", "MGR"].forEach(s => {
    const el = document.getElementById(s);
    if (!el) return;
    const show = s === id;
    el.style.display = show ? (s === "MGR" ? "flex" : "block") : "none";
  });
  window.scrollTo(0, 0);
}

// ── PIN SYSTEM ──
function openPIN(target, titleText, subText, onSuccess) {
  pinTarget = target;
  pinCallback = onSuccess;
  document.getElementById("pin-logo").src = LOGO_B64;
  document.getElementById("pin-err").style.display = "none";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-title").textContent = titleText;
  document.getElementById("pin-sub").textContent = subText;
  document.getElementById("pin-ov").style.display = "flex";
  setTimeout(() => document.getElementById("pin-inp").focus(), 200);
}
function closePIN() {
  document.getElementById("pin-ov").style.display = "none";
  pinTarget = null; pinCallback = null;
}
function checkPIN() {
  const v = document.getElementById("pin-inp").value;
  itPass = localStorage.getItem("itPass") || "1234";
  mgrPass = localStorage.getItem("mgrPass") || "0000";
  let correct = "";
  if (pinTarget === "mgr") correct = mgrPass;
  else if (pinTarget === "it") correct = itPass;
  else if (pinTarget === "branch" && pinCallback) {
    // Branch PIN handled by callback
    if (pinCallback(v)) { closePIN(); }
    else { document.getElementById("pin-err").style.display = "block"; document.getElementById("pin-inp").value = ""; }
    return;
  }
  if (v === correct) {
    const target = pinTarget;
    closePIN();
    if (target === "mgr") openMGR();
    else if (target === "it") openIT();
  } else {
    document.getElementById("pin-err").style.display = "block";
    document.getElementById("pin-inp").value = "";
  }
}

// ── SESSION ──
function saveSession() { if (curBranch) sessionStorage.setItem("cb", curBranch.id); }
function restoreSession() {
  const id = sessionStorage.getItem("cb");
  if (id && branches.find(b => b.id === id)) doSelectBranch(id);
}

// ── BRANCH SCREEN ──
function renderBS() {
  document.getElementById("bs-logo").src = LOGO_B64;
  document.getElementById("branch-grid").innerHTML = branches.map(b => `
    <div class="bcard" onclick="selectBranch('${b.id}')">
      <div class="bcard-icon">${b.icon}</div>
      <div class="bcard-name">${bn(b)}</div>
      <div class="bcard-tap">${b.pass ? "🔒 Tap to enter" : "Tap to enter"}</div>
    </div>`).join("");
}

function goBS() { showScreen("BS"); renderBS(); }

function selectBranch(id) {
  const b = branches.find(x => x.id === id);
  if (!b) return;
  if (b.pass && b.pass.length > 0) {
    openPIN("branch", b.icon + " " + bn(b), "Enter branch password", (v) => {
      if (v === b.pass) { doSelectBranch(id); return true; }
      return false;
    });
  } else {
    doSelectBranch(id);
  }
}

async function doSelectBranch(id) {
  curBranch = branches.find(b => b.id === id);
  loadBD();
  document.getElementById("h-logo").src = LOGO_B64;
  document.getElementById("h-branch").textContent = bn(curBranch);
  dailyDate = today(); dailyVals = {};
  monthDate = curMonth(); monthVals = {}; monthSts = {};
  showScreen("APP");
  saveSession();
  showTab("entry");
  // Load from Supabase
  const [dl, ml, settings] = await Promise.all([sbLoadDayLogs(id), sbLoadMonthLogs(id), sbLoadSettings()]);
  if (dl && dl.length > 0) {
    dayLogs = dl.map(r => ({ id: r.id, date: r.date, data: r.data || {} }));
    dayLogs.sort((a, b) => b.date.localeCompare(a.date));
    bs("dl", dayLogs);
    nextId = Math.max.apply(null, [nextId].concat(dayLogs.map(function(l){return l.id+1;})));
  }
  if (ml && ml.length > 0) {
    monthLogs = ml.map(r => ({ id: r.id, month: r.month, data: r.data || {}, status: r.status || {} }));
    bs("ml", monthLogs);
    nextId = Math.max.apply(null, [nextId].concat(monthLogs.map(function(l){return l.id+1;})));
  }
  if (settings) {
    const dk = id + "_dc"; const mk = id + "_mc";
    if (settings[dk]) { dailyCats = settings[dk]; bs("dc", dailyCats); }
    if (settings[mk]) { monthlyCats = settings[mk]; bs("mc", monthlyCats); }
  }
  const mex = monthLogs.find(l => l.month === monthDate);
  if (mex && mex.data) { monthVals = JSON.parse(JSON.stringify(mex.data)); monthSts = JSON.parse(JSON.stringify(mex.status || {})); }
  initDV(); initMV(); bs("ni", nextId);
  renderTab();
}

// ── TABS ──
function showTab(tab) {
  curTab = tab;
  document.querySelectorAll("#app-nav .nvb").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("nav-" + tab);
  if (btn) btn.classList.add("active");
  renderTab();
}
function renderTab() {
  const c = document.getElementById("content");
  if (curTab === "entry") c.innerHTML = rEntry();
  else if (curTab === "monthly") c.innerHTML = rMonthly();
  else if (curTab === "notes") c.innerHTML = rNotes();
  else c.innerHTML = rLog();
}

// ── DAILY ENTRY ──
function initDV() {
  Object.keys(dailyCats).forEach(type => {
    if (!dailyVals[type]) dailyVals[type] = {};
    dailyCats[type].subs.forEach(s => {
      if (dailyVals[type][s.en] === undefined) dailyVals[type][s.en] = 0;
    });
  });
}

function rEntry() {
  initDV();
  const todayDone = dayLogs.some(l => l.date === today());
  const remind = !todayDone && dailyDate === today() ? `
    <div class="remind">
      <span style="font-size:28px">⚠️</span>
      <div><div style="font-weight:800;font-size:14px;color:#d97706">Don't forget!</div>
      <div style="font-size:12px;color:#92400e">You haven't entered today's data yet</div></div>
    </div>` : "";
  const ex = dayLogs.find(l => l.date === dailyDate);
  const secs = Object.entries(dailyCats).map(([tk, cat]) => {
    const isO = openS[tk] !== false;
    const tot = Object.values(dailyVals[tk] || {}).reduce((s, v) => s + (parseFloat(v) || 0), 0);
    const rows = cat.subs.map(s => {
      const val = (dailyVals[tk]&&dailyVals[tk][s.en]) || "";
      return `<div class="srow"><div class="slbl">${s.en}</div>
        <input class="sinp" type="number" inputmode="decimal" placeholder="0" value="${val}"
          oninput="setDV('${tk}','${s.en}',this.value)"/></div>`;
    }).join("");
    return `<div class="dsec">
      <div class="dsh" onclick="togS('${tk}')">
        <div class="dsico" style="background:${cat.color}22">${cat.icon}</div>
        <div class="dst" style="color:${cat.color}">${cat.en}</div>
        <span class="dtot" style="color:${cat.color}" id="dt-${tk}">${fmt(tot)} OMR</span>
        <div class="darr ${isO ? "open" : ""}" id="da-${tk}">▼</div>
      </div>
      <div class="dsb" id="db-${tk}" style="display:${isO ? "block" : "none"}">
        ${rows}
        <div class="strow">
          <span style="font-weight:700;font-size:13px;color:var(--sub)">Total</span>
          <span style="font-weight:900;font-size:17px;color:${cat.color}" id="dt2-${tk}">${fmt(tot)} OMR</span>
        </div>
      </div>
    </div>`;
  }).join("");
  // Grand totals
  const grandSales = Object.values(dailyVals['sales'] || {}).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const grandExp = Object.values(dailyVals['expenses'] || {}).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const grandBar = `<div style="display:flex;gap:8px;margin-bottom:10px">
    <div style="flex:1;background:#f0fdf4;border-radius:11px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--sub);font-weight:600">📈 Sales</div>
      <div style="font-weight:900;font-size:16px;color:var(--G)" id="grand-sales">${fmt(grandSales)} OMR</div>
    </div>
    <div style="flex:1;background:#fff7ed;border-radius:11px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--sub);font-weight:600">💸 Expenses</div>
      <div style="font-weight:900;font-size:16px;color:var(--O)" id="grand-exp">${fmt(grandExp)} OMR</div>
    </div>
  </div>`;
  return `${remind}
    <div class="bar">
      <input type="date" value="${dailyDate}" onchange="chDD(this.value)" style="max-width:160px"/>
      <span style="font-size:13px;font-weight:700;color:var(--sub)">${fmtDate(dailyDate)}</span>
      <button class="svbtn svbtn-p" onclick="saveDL()">💾 ${ex ? "Update" : "Save"}</button>
    </div>
    ${ex ? `<div class="fnote" style="background:#eff6ff;color:var(--B)">✏️ Existing data — will update</div>` : ""}
    ${grandBar}
    ${secs}`;
}

function setDV(type, sub, val) {
  if (!dailyVals[type]) dailyVals[type] = {};
  dailyVals[type][sub] = parseFloat(val) || 0;
  const tot = Object.values(dailyVals[type]).reduce((s, v) => s + v, 0);
  const f = fmt(tot) + " OMR";
  const e1 = document.getElementById("dt-" + type);
  const e2 = document.getElementById("dt2-" + type);
  if (e1) e1.textContent = f;
  if (e2) e2.textContent = f;
  // Update grand totals
  const gs = Object.values(dailyVals['sales'] || {}).reduce((s,v)=>s+v,0);
  const ge = Object.values(dailyVals['expenses'] || {}).reduce((s,v)=>s+v,0);
  const gs_el = document.getElementById("grand-sales");
  const ge_el = document.getElementById("grand-exp");
  if(gs_el) gs_el.textContent = fmt(gs)+" OMR";
  if(ge_el) ge_el.textContent = fmt(ge)+" OMR";
}

function togS(k) {
  openS[k] = !openS[k];
  const b = document.getElementById("db-" + k) || document.getElementById("mb-" + k);
  const a = document.getElementById("da-" + k) || document.getElementById("ma-" + k);
  if (b) b.style.display = openS[k] ? "block" : "none";
  if (a) a.className = "darr" + (openS[k] ? " open" : "");
}

function chDD(v) {
  dailyDate = v;
  const ex = dayLogs.find(l => l.date === v);
  if (ex) { dailyVals = JSON.parse(JSON.stringify(ex.data)); initDV(); }
  else { dailyVals = {}; initDV(); }
  renderTab();
}

function saveDL() {
  const hasData = Object.values(dailyVals).some(cat => Object.values(cat || {}).some(v => v > 0));
  if (!hasData) { toast("Please enter at least one value", "#ef4444"); return; }
  const data = JSON.parse(JSON.stringify(dailyVals));
  const ex = dayLogs.find(l => l.date === dailyDate);
  if (ex) { ex.data = data; toast("Updated ✓"); }
  else { dayLogs.unshift({ id: nextId++, date: dailyDate, data }); dayLogs.sort((a, b) => b.date.localeCompare(a.date)); toast("Saved ✓"); }
  saveBD();
  const log = dayLogs.find(l => l.date === dailyDate);
  if (log) sbSaveDayLog(curBranch.id, log);
  dailyVals = {}; dailyDate = today(); initDV();
  showTab("log");
}

// ── MONTHLY ──
function initMV() {
  Object.keys(monthlyCats).forEach(type => {
    if (!monthVals[type]) monthVals[type] = {};
    if (!monthSts[type]) monthSts[type] = {};
    monthlyCats[type].subs.forEach(s => {
      if (monthVals[type][s.en] === undefined) monthVals[type][s.en] = 0;
      if (monthSts[type][s.en] === undefined) monthSts[type][s.en] = "pending";
    });
  });
}

function rMonthly() {
  const ex = monthLogs.find(l => l.month === monthDate);
  if (ex && ex.data) { monthVals = JSON.parse(JSON.stringify(ex.data)); monthSts = JSON.parse(JSON.stringify(ex.status || {})); }
  initMV();
  const secs = Object.entries(monthlyCats).map(([tk, cat]) => {
    const isO = openS[tk] !== false;
    const rows = cat.subs.map(s => {
      const val = (monthVals[tk]&&monthVals[tk][s.en]) || "";
      const ip = ((monthSts[tk]&&monthSts[tk][s.en]) || "pending") === "paid";
      const bid = "sb-" + tk + "-" + s.en.replace(/\s/g, "_");
      return `<div class="srow">
        <div class="slbl">${s.en}</div>
        <input class="sinp" style="width:90px" type="number" inputmode="decimal" placeholder="0" value="${val}"
          oninput="setMV('${tk}','${s.en}',this.value)"/>
        <button id="${bid}" class="${ip ? "sts-paid" : "sts-pend"}" onclick="togSts('${tk}','${s.en}')">
          ${ip ? "✅ Paid" : "⏳ Pending"}
        </button>
      </div>`;
    }).join("");
    return `<div class="dsec">
      <div class="dsh" onclick="togS('${tk}')">
        <div class="dsico" style="background:${cat.color}22">${cat.icon}</div>
        <div class="dst" style="color:${cat.color}">${cat.en}</div>
        <div class="darr ${isO ? "open" : ""}" id="ma-${tk}">▼</div>
      </div>
      <div class="dsb" id="mb-${tk}" style="display:${isO ? "block" : "none"}">${rows}</div>
    </div>`;
  }).join("");
  return `<div class="bar">
    <input type="month" value="${monthDate}" onchange="chMD(this.value)"/>
    <button class="svbtn svbtn-p" onclick="saveML()">💾 ${ex ? "Update" : "Save"}</button>
  </div>
  <div class="fnote" style="background:#f5f3ff;color:#6d28d9">📌 Enter monthly fixed costs once per month</div>
  ${secs}`;
}

function setMV(type, sub, val) {
  if (!monthVals[type]) monthVals[type] = {};
  monthVals[type][sub] = Math.abs(parseFloat(val) || 0);
}
function togSts(type, sub) {
  if (!monthSts[type]) monthSts[type] = {};
  monthSts[type][sub] = monthSts[type][sub] === "paid" ? "pending" : "paid";
  const ip = monthSts[type][sub] === "paid";
  const bid = "sb-" + type + "-" + sub.replace(/\s/g, "_");
  const btn = document.getElementById(bid);
  if (btn) { btn.className = ip ? "sts-paid" : "sts-pend"; btn.textContent = ip ? "✅ Paid" : "⏳ Pending"; }
}
function chMD(v) {
  monthDate = v;
  const ex = monthLogs.find(l => l.month === v);
  if (ex && ex.data) { monthVals = JSON.parse(JSON.stringify(ex.data)); monthSts = JSON.parse(JSON.stringify(ex.status || {})); }
  else { monthVals = {}; monthSts = {}; }
  initMV(); renderTab();
}
function saveML() {
  const data = JSON.parse(JSON.stringify(monthVals));
  const status = JSON.parse(JSON.stringify(monthSts));
  const ex = monthLogs.find(l => l.month === monthDate);
  if (ex) { ex.data = data; ex.status = status; toast("Updated ✓"); }
  else { monthLogs.unshift({ id: nextId++, month: monthDate, data, status }); toast("Saved ✓"); }
  saveBD();
  const log = monthLogs.find(l => l.month === monthDate);
  if (log) sbSaveMonthLog(curBranch.id, log);
  monthVals = {}; monthSts = {}; monthDate = curMonth(); initMV();
  showTab("log");
}

// ── LOG ──
function rLog() {
  const months = Array.from(new Set(dayLogs.map(function(l){return l.date.slice(0,7);}))).sort().reverse();
  const filtered = flm ? dayLogs.filter(l => l.date.startsWith(flm)) : dayLogs;
  const mOpts = `<option value="">All Months</option>` + months.map(m => `<option value="${m}" ${flm === m ? "selected" : ""}>${m}</option>`).join("");
  const fb = `<div class="bar">
    <select onchange="flm=this.value;renderTab()">${mOpts}</select>
    <span style="color:var(--sub);font-size:12px">${filtered.length} days</span>
  </div>`;
  if (!filtered.length) return fb + `<div class="empty"><div style="font-size:38px;margin-bottom:8px">📭</div><div>No records yet</div></div>`;
  let odl = window._odl || {}; window._odl = odl;
  return fb + filtered.map(log => {
    const isO = odl[log.id];
    const body = isO ? `<div class="logb">
      ${Object.entries(dailyCats).map(([tk, cat]) => {
        const data = log.data[tk] || {};
        const items = Object.entries(data).filter(([, v]) => v > 0).map(([sub]) =>
          `<span class="chip" style="background:${cat.color}18;color:${cat.color}">${sub} ✓</span>`
        ).join("");
        return items ? `<div style="margin-bottom:8px">
          <div style="font-weight:700;font-size:12px;color:${cat.color};margin-bottom:5px">${cat.icon} ${cat.en}</div>
          <div style="display:flex;flex-wrap:wrap">${items}</div>
        </div>` : "";
      }).join("")}
      <div style="display:flex;gap:7px;padding-top:8px;border-top:1px solid var(--bdr)">
        <button style="flex:1;padding:7px;border-radius:9px;border:none;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;background:#eff6ff;color:var(--B)" onclick="editDL(${log.id})">✏️ Edit</button>
        <button style="flex:1;padding:7px;border-radius:9px;border:none;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;background:#fef2f2;color:var(--R)" onclick="delDL(${log.id})">🗑️ Delete</button>
      </div>
    </div>` : "";
    return `<div class="logi">
      <div class="logh" onclick="window._odl=window._odl||{};window._odl['${log.id}']=!window._odl['${log.id}'];renderTab()">
        <div>
          <div style="font-weight:800;font-size:14px">📅 ${log.date}</div>
          <div style="font-size:11px;color:var(--sub);margin-top:2px">Entry saved ✓</div>
        </div>
        <div style="font-size:20px">${isO ? "▲" : "▼"}</div>
      </div>${body}
    </div>`;
  }).join("");
}

function rNotes(){
  const key = curBranch.id + "_notes";
  const notes = JSON.parse(localStorage.getItem(key) || "[]");
  const rows = notes.length ? notes.map((n,i) => `
    <div style="background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="font-size:12px;color:var(--sub);margin-bottom:4px">📅 ${fmtDate(n.date)}</div>
          <div style="font-size:14px;font-weight:600">${n.text}</div>
        </div>
        <button onclick="deleteNote(${i})" style="background:#fef2f2;color:var(--R);border:none;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;margin-left:8px">🗑️</button>
      </div>
    </div>`).join("") : `<div class="empty"><div style="font-size:38px;margin-bottom:8px">📝</div><div>No notes yet</div></div>`;
  return `<div class="card">
    <div class="card-title">📝 Add Note to Manager</div>
    <textarea id="note-text" placeholder="Write your note here..." style="width:100%;padding:10px;border:2px solid var(--bdr);border-radius:10px;font-family:inherit;font-size:14px;min-height:80px;outline:none;resize:none" onfocus="this.style.borderColor='var(--P)'" onblur="this.style.borderColor='var(--bdr)'"></textarea>
    <button class="svbtn svbtn-p" style="width:100%;margin-top:8px" onclick="saveNote()">📤 Send Note</button>
  </div>
  <div class="card"><div class="card-title">📋 Previous Notes</div>${rows}</div>`;
}

function saveNote(){
  const text = (document.getElementById("note-text")||{value:""}).value.trim();
  if(!text){toast("Write something first","#ef4444");return;}
  const key = curBranch.id + "_notes";
  const notes = JSON.parse(localStorage.getItem(key) || "[]");
  notes.unshift({text, date: today(), branch: bn(curBranch)});
  localStorage.setItem(key, JSON.stringify(notes));
  sbSaveSettings(key, notes);
  toast("Note sent ✓");
  document.getElementById("note-text").value = "";
  renderTab();
}
function deleteNote(i){
  const key = curBranch.id + "_notes";
  const notes = JSON.parse(localStorage.getItem(key) || "[]");
  notes.splice(i,1);
  localStorage.setItem(key, JSON.stringify(notes));
  sbSaveSettings(key, notes);
  toast("Deleted","#ef4444");
  renderTab();
}

function delDL(id) {
  openModal(`<div style="text-align:center;padding:10px 0">
    <div style="font-size:40px;margin-bottom:10px">🗑️</div>
    <div style="font-weight:800;font-size:15px;color:var(--R);margin-bottom:16px">Delete this day?</div>
    <div class="mbtns">
      <button class="mbtn" style="background:#f1f5f9;color:var(--sub)" onclick="closeModal()">Cancel</button>
      <button class="mbtn" style="background:var(--R);color:#fff" onclick="confirmDelDL(${id})">Delete</button>
    </div>
  </div>`);
}
function confirmDelDL(id) {
  dayLogs = dayLogs.filter(l => l.id !== id);
  saveBD(); sbDeleteDayLog(curBranch.id, id);
  closeModal(); toast("Deleted", "#ef4444"); renderTab();
}
function editDL(id) {
  const log = dayLogs.find(l => l.id === id);
  if (!log) return;
  dailyDate = log.date; dailyVals = JSON.parse(JSON.stringify(log.data));
  initDV(); showTab("entry");
}

function openMGR() {
  document.getElementById("mgr-logo").src = LOGO_B64;
  document.getElementById("mgr-sub").textContent = branches.length + " branches";
  showScreen("MGR");

function sendWhatsApp(){

  var nl = "\n";
  var line = "---" + nl;
  var msg = "Chicklets Daily Report" + nl;
  msg += "Date: " + fmtDate(todayStr) + nl;
  msg += line;
  var total = 0;
  branches.forEach(function(b) {
    var bd = getBD(b.id);
    var tlog = bd.dl.find(function(l){return l.date===todayStr;});
    var s = 0;
    if(tlog) Object.entries(tlog.data||{}).forEach(function(e){
      var t=e[0], subs=e[1];
      if(t==="sales") Object.values(subs||{}).forEach(function(v){s+=v;});
    });
    msg += b.icon + " " + bn(b) + ": " + fmt(s) + " OMR " + (tlog ? "OK" : "No data") + nl;
    total += s;
  });
  msg += line;
  msg += "Total: " + fmt(total) + " OMR";
  var url = "https://wa.me/?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

function getBranchTotals(bid) {
  const bd = getBD(bid); let s = 0, e = 0, f = 0;
  bd.dl.forEach(log => { Object.entries(log.data || {}).forEach(([type, subs]) => { Object.values(subs || {}).forEach(v => { if (type === "sales") s += v; else if (type === "expenses") e += v; }); }); });
  const ml = bd.ml.find(l => l.month === curMonth());
  if (ml && ml.data && ml.data.fixed) Object.values(ml.data.fixed).forEach(v => f += v);
  return { s, e, f, net: s - e - f, dl: bd.dl, ml: bd.ml };
}

function showWeekCompare(){
  var from=(document.getElementById("cmp-from")||{value:""}).value;
  var to=(document.getElementById("cmp-to")||{value:""}).value;
  if(!from||!to)return;
  var weeks=[],cur=new Date(from),end=new Date(to);
  while(cur<=end){
    var ws=cur.toISOString().split("T")[0],we=new Date(cur);
    we.setDate(we.getDate()+6);
    if(we>end)we=new Date(end);
    weeks.push({start:ws,end:we.toISOString().split("T")[0]});
    cur.setDate(cur.getDate()+7);
  }
  if(!weeks.length)return;
  var wData=weeks.map(function(w){
    var total=0,bData=branches.map(function(b){
      var bd=getBD(b.id),bs=0;
      bd.dl.filter(function(l){return l.date>=w.start&&l.date<=w.end;}).forEach(function(log){
        Object.entries(log.data||{}).forEach(function(e){if(e[0]==="sales")Object.values(e[1]||{}).forEach(function(v){bs+=v;});});
      });
      total+=bs;return{name:bn(b),icon:b.icon,sales:bs};
    });
    return{start:w.start,end:w.end,total:total,bData:bData};
  });
  var maxS=1;wData.forEach(function(w){if(w.total>maxS)maxS=w.total;});
  var best=wData[0],worst=wData[0];
  wData.forEach(function(w){if(w.total>best.total)best=w;if(w.total<worst.total)worst=w;});
  var rows="";
  wData.forEach(function(w,i){
    var pct=Math.round((w.total/maxS)*100);
    var isBest=wData.length>1&&w.start===best.start;
    var isWorst=wData.length>1&&w.start===worst.start;
    rows+='<div style="background:'+(isBest?"#f0fdf4":isWorst?"#fef2f2":"#f8fafc")+';border-radius:11px;padding:11px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><div style="font-weight:700;font-size:12px">W'+(i+1)+': '+fmtDate(w.start)+' - '+fmtDate(w.end)+'</div>';
    if(isBest)rows+='<span style="font-size:10px;background:#dcfce7;color:#166534;padding:1px 6px;border-radius:5px">Best</span>';
    if(isWorst)rows+='<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:5px">Slowest</span>';
    rows+='</div><div style="font-weight:900;font-size:14px;color:'+(isBest?"var(--G)":isWorst?"var(--R)":"var(--text)")+'">'+fmt(w.total)+' OMR</div></div><div style="background:#e5e7eb;border-radius:6px;height:7px;margin-bottom:5px"><div style="background:'+(isBest?"var(--G)":isWorst?"var(--R)":"var(--B)")+';height:7px;border-radius:6px;width:'+pct+'%"></div></div><div style="display:flex;gap:5px;flex-wrap:wrap">';
    w.bData.forEach(function(b){rows+='<span style="font-size:11px;background:#fff;padding:2px 7px;border-radius:6px">'+b.icon+' '+fmt(b.sales)+'</span>';});
    rows+='</div></div>';
  });
  var el=document.getElementById("week-compare-result");
  if(el)el.innerHTML=rows;
}

function getBizData() {
  return {
    totalBranches: branches.length, currentMonth: curMonth(), today: today(),
    branches: branches.map(b => {
      const bd = getBD(b.id); let ts = 0, te = 0, tf = 0;
      const monthly = {};
      bd.dl.forEach(log => {
        const m = log.date.slice(0, 7);
        if (!monthly[m]) monthly[m] = { s: 0, e: 0, days: 0 };
        Object.entries(log.data || {}).forEach(([type, subs]) => { Object.entries(subs || {}).forEach(([, val]) => { if (type === "sales") { ts += val; monthly[m].s += val; } else if (type === "expenses") { te += val; monthly[m].e += val; } }); });
        monthly[m].days++;
      });
      const ml = bd.ml.find(l => l.month === curMonth());
      if (ml && ml.data && ml.data.fixed) Object.values(ml.data.fixed).forEach(v => tf += v);
      return { name: bn(b), totalSales: ts, totalExpenses: te, totalFixed: tf, netProfit: ts - te - tf, daysRecorded: bd.dl.length, monthlyBreakdown: monthly };
    })
  };
}

async function askAI(question) {
  if (!claudeKey) {
    var msgs = document.getElementById("ai-messages");
    if(msgs) {
      var div = document.createElement("div");
      div.style.cssText = "background:#fef3c7;border:2px solid #f59e0b;border-radius:12px;padding:12px;margin:8px 0;font-size:13px";
      div.innerHTML = "<strong>⚠️ No API Key!</strong><br/>Please go to IT Admin → AI Settings and add your Claude API Key first.";
      msgs.appendChild(div);
    }
    return;
  }
  addAIMessage("user", question);
  addAIMessage("assistant", "", true);
  const bizData = getBizData();
  // Build weekly data
  const weeks = {};
  branches.forEach(b => {
    const bd = getBD(b.id);
    bd.dl.forEach(log => {
      const d = new Date(log.date);
      const weekNum = Math.floor((d - new Date(d.getFullYear(),0,1))/(7*24*3600*1000));
      const wk = d.getFullYear()+"_W"+weekNum;
      if(!weeks[wk]) weeks[wk] = {start:log.date,end:log.date,sales:0,expenses:0,days:0};
      if(log.date < weeks[wk].start) weeks[wk].start = log.date;
      if(log.date > weeks[wk].end) weeks[wk].end = log.date;
      Object.entries(log.data||{}).forEach(([type,subs])=>{
        Object.values(subs||{}).forEach(v=>{
          if(type==="sales") weeks[wk].sales+=v;
          if(type==="expenses") weeks[wk].expenses+=v;
        });
      });
      weeks[wk].days++;
    });
  });
  const weeklyData = Object.entries(weeks).sort().slice(-8).map(function(e){return Object.assign({week:e[0]},e[1]);});
  const todayEvents = {
    isRamadan: false,
    isSummer: new Date().getMonth()>=5&&new Date().getMonth()<=8,
    dayOfWeek: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()],
    month: new Date().toLocaleString('en',{month:'long'})
  };
  const systemPrompt = `You are a sharp restaurant business analyst for Chicklets Fried Chicken in Muscat, Oman. Be concise, specific with numbers, actionable. Use OMR currency. Max 150 words per response.
Current context: ${JSON.stringify(todayEvents)}
Weekly performance (last 8 weeks): ${JSON.stringify(weeklyData)}
Business data: ${JSON.stringify(bizData)}`;
  aiMessages.push({ role: "user", content: question });
  try {
    var sysPromptSafe = "";
    try { sysPromptSafe = systemPrompt; } catch(e) { sysPromptSafe = "Analyze Chicklets restaurant data. Be concise."; }
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": claudeKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 500, system: sysPromptSafe, messages: aiMessages })
    });
    const data = await res.json();
    const loadingMsg = document.getElementById("ai-loading-msg");
    if (loadingMsg) loadingMsg.remove();
    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      aiMessages.push({ role: "assistant", content: reply });
      addAIMessage("assistant", formatAIText(reply));
    } else {
      addAIMessage("assistant", "Error: " + JSON.stringify(data));
    }
  } catch (err) {
    const loadingMsg = document.getElementById("ai-loading-msg");
    if (loadingMsg) loadingMsg.remove();
    addAIMessage("assistant", "Connection error. Please try again.");
  }
}

    '</div></div>' +
    '<div class="card"><div class="card-title">📊 Total Received <span style="background:#f0fdf4;color:var(--G);padding:4px 10px;border-radius:8px;font-size:14px">' + fmt(total) + ' OMR</span></div>' +
    rows + '</div>';
}

function addTransfer() {
  var amount = parseFloat((document.getElementById("tr-amount")||{value:0}).value)||0;
  var date = (document.getElementById("tr-date")||{value:today()}).value || today();
  var note = ((document.getElementById("tr-note")||{value:""}).value||"").trim();
  if(!amount){toast("Enter amount","#ef4444");return;}
  transfers.unshift({amount:amount, date:date, note:note});
  transfers.sort(function(a,b){return b.date.localeCompare(a.date);});
  localStorage.setItem("transfers", JSON.stringify(transfers));
  toast("Transfer added ✓");
  renderMTab();
}

function deleteTransfer(i) {
  transfers.splice(i,1);
  localStorage.setItem("transfers", JSON.stringify(transfers));
  toast("Deleted","#ef4444");
  renderMTab();
}

// ══ SMART ALERTS ══
function runSmartAlerts() {
  var alerts = [];
  var todayStr = today();
  var d = new Date(); d.setDate(d.getDate()-1);
  var yesterStr = d.toISOString().split("T")[0];

  branches.forEach(function(b) {
    var bd = getBD(b.id);
    var hasToday = bd.dl.some(function(l){return l.date===todayStr;});
    if(!hasToday) alerts.push("⚠️ " + bn(b) + ": No data entered today!");

    var tlog = bd.dl.find(function(l){return l.date===todayStr;});
    var ylog = bd.dl.find(function(l){return l.date===yesterStr;});
    if(tlog && ylog) {
      var ts=0, ys=0;
      Object.entries(tlog.data||{}).forEach(function(e){if(e[0]==="sales")Object.values(e[1]||{}).forEach(function(v){ts+=v;});});
      Object.entries(ylog.data||{}).forEach(function(e){if(e[0]==="sales")Object.values(e[1]||{}).forEach(function(v){ys+=v;});});
      if(ys>0 && ts<ys*0.8) alerts.push("📉 " + bn(b) + ": Sales dropped " + Math.round((1-ts/ys)*100) + "% vs yesterday!");
    }

    var ms=0, me=0;
    bd.dl.filter(function(l){return l.date.startsWith(curMonth());}).forEach(function(log){
      Object.entries(log.data||{}).forEach(function(e){
        if(e[0]==="sales")Object.values(e[1]||{}).forEach(function(v){ms+=v;});
        if(e[0]==="expenses")Object.values(e[1]||{}).forEach(function(v){me+=v;});
      });
    });
    if(ms>0 && me/ms>0.6) alerts.push("🔴 " + bn(b) + ": Expenses are " + Math.round(me/ms*100) + "% of sales!");
  });

  var msgs = document.getElementById("ai-messages");
  if(!msgs) return;
  if(!alerts.length) { addAIMessage("assistant","✅ No critical alerts! Everything looks good."); return; }
  var alertHtml = alerts.map(function(a){return '<div style="padding:5px 0;border-bottom:1px solid #f1f5f9">'+a+'</div>';}).join("");
  addAIMessage("assistant", "<strong>🚨 Smart Alerts (" + alerts.length + ")</strong><br/>" + alertHtml);
}

// ══ EXPORT EXCEL ══
function exportToExcel() {
  var rows = [["Branch","Date","Category","Item","Amount (OMR)"]];
  branches.forEach(function(b) {
    var bd = getBD(b.id);
    bd.dl.forEach(function(log) {
      Object.entries(log.data||{}).forEach(function(e) {
        Object.entries(e[1]||{}).forEach(function(e2) {
          if(e2[1]>0) rows.push([bn(b), log.date, e[0], e2[0], e2[1]]);
        });
      });
    });
    bd.ml.forEach(function(mlog) {
      Object.entries(mlog.data||{}).forEach(function(e) {
        Object.entries(e[1]||{}).forEach(function(e2) {
          if(e2[1]>0) rows.push([bn(b), mlog.month, "fixed", e2[0], e2[1]]);
        });
      });
    });
  });
  var csv = rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "chicklets_" + today() + ".csv";
  a.click();
  toast("Exported ✓");
}

// ══ EDIT SALES IN IT ══
function loadEditEntry() {
  var bid = (document.getElementById("edit-branch")||{value:""}).value;
  var date = (document.getElementById("edit-date")||{value:""}).value;
  if(!bid||!date){toast("Select branch and date","#ef4444");return;}
  var savedBranch = curBranch;
  curBranch = branches.find(function(b){return b.id===bid;});
  if(!curBranch){curBranch=savedBranch;return;}
  loadBD();
  var log = dayLogs.find(function(l){return l.date===date;});
  var area = document.getElementById("edit-entry-area");
  if(!area){curBranch=savedBranch;loadBD();return;}
  var rows = "";
  Object.entries(dailyCats).forEach(function(e) {
    var tk=e[0], cat=e[1];
    rows += '<div style="margin-bottom:10px"><div style="font-weight:700;font-size:13px;color:'+cat.color+';margin-bottom:5px">'+cat.icon+' '+cat.en+'</div>';
    cat.subs.forEach(function(s) {
      var val = (log&&log.data&&log.data[tk]&&log.data[tk][s.en])||0;
      rows += '<div class="srow"><div class="slbl">'+s.en+'</div>';
      rows += '<input class="sinp" type="number" inputmode="decimal" id="eit-'+tk+'-'+s.en.replace(/ /g,'_')+'" value="'+val+'" placeholder="0"/></div>';
    });
    rows += '</div>';
  });
  area.innerHTML = '<div style="background:#f8fafc;border-radius:11px;padding:12px;margin-top:8px">'+
    '<div style="font-weight:700;margin-bottom:10px">'+date+' — '+bn(curBranch)+'</div>'+rows+
    '<button class="svbtn svbtn-g" style="width:100%;margin-top:8px" id="save-edit-btn">Save Changes</button></div>';
  var btn = document.getElementById("save-edit-btn");
  if(btn) btn.onclick = function(){ saveEditEntry(bid, date); };
  curBranch=savedBranch; loadBD();
}

function saveEditEntry(bid, date) {
  var savedBranch = curBranch;
  curBranch = branches.find(function(b){return b.id===bid;});
  if(!curBranch){return;}
  loadBD();
  var data = {};
  Object.entries(dailyCats).forEach(function(e) {
    var tk=e[0], cat=e[1]; data[tk]={};
    cat.subs.forEach(function(s) {
      var el = document.getElementById("eit-"+tk+"-"+s.en.replace(/ /g,'_'));
      data[tk][s.en] = el ? (parseFloat(el.value)||0) : 0;
    });
  });
  var ex = dayLogs.find(function(l){return l.date===date;});
  if(ex){ex.data=data;}
  else{dayLogs.unshift({id:nextId++,date:date,data:data});dayLogs.sort(function(a,b){return b.date.localeCompare(a.date);});}
  saveBD();
  var log = dayLogs.find(function(l){return l.date===date;});
  if(log) sbSaveDayLog(bid, log);
  toast("Saved by IT ✓");
  curBranch=savedBranch; loadBD();
  var area = document.getElementById("edit-entry-area");
  if(area) area.innerHTML = '<div style="color:var(--G);font-weight:700;padding:10px">✅ Saved!</div>';
}

// ══ MGR NOTES ══
function rMgrNotes() {
  var allNotes = [];
  branches.forEach(function(b) {
    var key = b.id+"_notes";
    var notes = JSON.parse(localStorage.getItem(key)||"[]");
    notes.forEach(function(n){allNotes.push(Object.assign({branchName:bn(b),branchIcon:b.icon},n));});
  });
  allNotes.sort(function(a,b){return b.date.localeCompare(a.date);});
  if(!allNotes.length) return '<div class="empty"><div style="font-size:38px;margin-bottom:8px">📝</div><div>No notes from branches</div></div>';
  return '<div class="card"><div class="card-title">📝 Branch Notes</div>' +
    allNotes.map(function(n){return '<div style="background:#f8fafc;border-radius:11px;padding:10px;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+
      '<span>'+n.branchIcon+'</span><span style="font-weight:700;font-size:12px">'+n.branchName+'</span>'+
      '<span style="font-size:11px;color:var(--sub);margin-left:auto">'+fmtDate(n.date)+'</span></div>'+
      '<div style="font-size:13px">'+n.text+'</div></div>';}).join("")+'</div>';
}

document.addEventListener("DOMContentLoaded", async function() {
  // logos embedded directly in HTML
  itPass = localStorage.getItem("itPass") || "1234";
  mgrPass = localStorage.getItem("mgrPass") || "0000";
  // Set default API key if not already set
  if(!localStorage.getItem("claudeKey")){
    localStorage.setItem("claudeKey", "");
  }
  claudeKey = localStorage.getItem("claudeKey") || "";
  showScreen("BS");
  renderBS();
  await sbLoadBranches();
  // Pre-load all branch data for Manager View
  if(branches.length > 0) {
    branches.forEach(async function(b) {
      var dl = await sbLoadDayLogs(b.id);
      var ml = await sbLoadMonthLogs(b.id);
      if(dl && dl.length > 0) {
        var dayData = dl.map(function(r){return {id:r.id, date:r.date, data:r.data||{}};});
        dayData.sort(function(a,b){return b.date.localeCompare(a.date);});
        localStorage.setItem(b.id+"_dl", JSON.stringify(dayData));
      }
      if(ml && ml.length > 0) {
        var monthData = ml.map(function(r){return {id:r.id, month:r.month, data:r.data||{}, status:r.status||{}};});
        localStorage.setItem(b.id+"_ml", JSON.stringify(monthData));
      }
    });
  }
  setInterval(async function() {
    var data = await sbFetch("/rest/v1/branches?select=*&order=sort_order,id");
    if (data && data.length > 0) {
      branches = data.map(function(b) { return { id: b.id, name: b.name, nameEn: b.name_en || b.name, icon: b.icon || "🍗", pass: b.pass || "", sort_order: b.sort_order || 0 }; });
      localStorage.setItem("branches", JSON.stringify(branches));
      renderBS();
    }
  }, 60000);
});
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
}
